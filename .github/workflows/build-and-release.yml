name: Build, Sign, Notarize and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build, Sign, Notarize, Release
    runs-on: macos-latest
    permissions:
      contents: write

    env:
      SCHEME: Touch-Tab
      PROJECT: Touch-Tab.xcodeproj
      BUNDLE_ID: ris58h.Touch-Tab
      TEAM_ID: LFFSCV49TG
      APP_NAME: Touch-Tab.app
      ARCHIVE_PATH: ${{ runner.temp }}/Touch-Tab.xcarchive
      EXPORT_PATH: ${{ runner.temp }}/export
      ZIP_NAME: Touch-Tab.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Developer ID Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Create Export Options Plist
        run: |
          mkdir -p "$EXPORT_PATH"
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

      - name: Archive
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            clean archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Export (sign with Developer ID)
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Zip for notarization submission
          ditto -c -k --sequesterRsrc --keepParent \
            "$EXPORT_PATH/$APP_NAME" \
            "$RUNNER_TEMP/notarize.zip"

          # Submit and wait
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

          # Staple the ticket to the app
          xcrun stapler staple "$EXPORT_PATH/$APP_NAME"

      - name: Zip for release
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$EXPORT_PATH/$APP_NAME" \
            "$EXPORT_PATH/$ZIP_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Build {0}', github.run_number) }}
          generate_release_notes: true
          body: |
            ## Install
            1. Download `Touch-Tab.zip` below
            2. Unzip and drag `Touch-Tab.app` to your Applications folder
            3. Open it — no security warnings, fully signed and notarized
          files: ${{ env.EXPORT_PATH }}/${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
